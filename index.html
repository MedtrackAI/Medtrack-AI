<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedTrack AI - Medical Coding Workflow Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.8.0/umd/Recharts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0B0F1A; font-family: 'DM Sans', sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Check if Recharts is available
    const RechartsLib = window.Recharts || {};
    const { 
      LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, 
      ResponsiveContainer, AreaChart, Area, BarChart, Bar 
    } = RechartsLib;

    // ---------- design tokens ----------
    const theme = {
      bg: "#0B0F1A",
      surface: "#111827",
      card: "#161D2E",
      border: "#1F2A3D",
      accent: "#00C6A7",
      accentDim: "rgba(0,198,167,0.12)",
      accentGlow: "rgba(0,198,167,0.3)",
      blue: "#3B82F6",
      purple: "#8B5CF6",
      amber: "#F59E0B",
      red: "#EF4444",
      text: "#F1F5F9",
      muted: "#64748B",
      subtle: "#94A3B8",
    };

    const globalStyles = `
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
      body { background: ${theme.bg}; color: ${theme.text}; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: ${theme.surface}; }
      ::-webkit-scrollbar-thumb { background: ${theme.border}; border-radius: 2px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      .fade-in { animation: fadeIn 0.4s ease forwards; }
    `;

    // ---------- mock data ----------
    const chartTrendData = [
      { day: "Mon", completed: 42, pending: 18, target: 50 },
      { day: "Tue", completed: 58, pending: 12, target: 50 },
      { day: "Wed", completed: 47, pending: 22, target: 50 },
      { day: "Thu", completed: 63, pending: 9,  target: 50 },
      { day: "Fri", completed: 71, pending: 5,  target: 50 },
      { day: "Sat", completed: 38, pending: 14, target: 50 },
      { day: "Sun", completed: 29, pending: 8,  target: 50 },
    ];

    const productivityData = [
      { week: "W1", rate: 72 }, { week: "W2", rate: 78 },
      { week: "W3", rate: 81 }, { week: "W4", rate: 76 },
      { week: "W5", rate: 85 }, { week: "W6", rate: 89 },
    ];

    const initialCharts = [
      { id: "CHT-1042", project: "Medicare Q4", coder: "Sarah M.", status: "Completed", date: "2026-02-22", priority: "High" },
      { id: "CHT-1041", project: "Medicaid Review", coder: "James R.", status: "In Progress", date: "2026-02-22", priority: "Medium" },
      { id: "CHT-1040", project: "Blue Cross Audit", coder: "Ana T.", status: "Pending", date: "2026-02-21", priority: "High" },
      { id: "CHT-1039", project: "Medicare Q4", coder: "David L.", status: "Completed", date: "2026-02-21", priority: "Low" },
      { id: "CHT-1038", project: "UHC Claims", coder: "Sarah M.", status: "In Progress", date: "2026-02-20", priority: "Medium" },
      { id: "CHT-1037", project: "Aetna Batch", coder: "Mark W.", status: "Pending", date: "2026-02-20", priority: "High" },
      { id: "CHT-1036", project: "Medicaid Review", coder: "James R.", status: "Completed", date: "2026-02-19", priority: "Low" },
      { id: "CHT-1035", project: "Blue Cross Audit", coder: "Ana T.", status: "Completed", date: "2026-02-19", priority: "Medium" },
    ];

    const initialUsers = [
      { id: 1, name: "Sarah Mitchell", email: "sarah.m@medtrack.io", role: "Coder", status: "Active", charts: 142, accuracy: "96.8%" },
      { id: 2, name: "James Rivera", email: "james.r@medtrack.io", role: "Coder", status: "Active", charts: 118, accuracy: "94.2%" },
      { id: 3, name: "Ana Torres", email: "ana.t@medtrack.io", role: "Coder", status: "Active", charts: 97, accuracy: "98.1%" },
      { id: 4, name: "David Lee", email: "david.l@medtrack.io", role: "Admin", status: "Active", charts: 0, accuracy: "—" },
      { id: 5, name: "Mark Wilson", email: "mark.w@medtrack.io", role: "Coder", status: "Inactive", charts: 63, accuracy: "91.5%" },
    ];

    // ---------- Badge component ----------
    const Badge = ({ status }) => {
      const map = {
        Completed: { color: theme.accent, bg: "rgba(0,198,167,0.1)" },
        "In Progress": { color: theme.blue, bg: "rgba(59,130,246,0.1)" },
        Pending: { color: theme.amber, bg: "rgba(245,158,11,0.1)" },
        Active: { color: theme.accent, bg: "rgba(0,198,167,0.1)" },
        Inactive: { color: theme.muted, bg: "rgba(100,116,139,0.1)" },
        High: { color: theme.red, bg: "rgba(239,68,68,0.1)" },
        Medium: { color: theme.amber, bg: "rgba(245,158,11,0.1)" },
        Low: { color: theme.accent, bg: "rgba(0,198,167,0.1)" },
        Admin: { color: theme.purple, bg: "rgba(139,92,246,0.1)" },
        Coder: { color: theme.blue, bg: "rgba(59,130,246,0.1)" },
      };
      const s = map[status] || { color: theme.muted, bg: "rgba(100,116,139,0.1)" };
      return (
        <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600, color: s.color, background: s.bg, letterSpacing: "0.02em" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: s.color, flexShrink: 0 }} />
          {status}
        </span>
      );
    };

    // ---------- Card ----------
    const Card = ({ children, style = {}, animate = true }) => (
      <div className={animate ? "fade-in" : ""} style={{ background: theme.card, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 24, ...style }}>
        {children}
      </div>
    );

    // ---------- Input ----------
    const Input = ({ label, type = "text", value, onChange, placeholder, style = {} }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 6, ...style }}>
        {label && <label style={{ fontSize: 13, color: theme.subtle, fontWeight: 500 }}>{label}</label>}
        <input type={type} value={value} onChange={onChange} placeholder={placeholder}
          style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 10, padding: "10px 14px", color: theme.text, fontSize: 14, outline: "none", transition: "border-color 0.2s" }}
          onFocus={e => e.target.style.borderColor = theme.accent}
          onBlur={e => e.target.style.borderColor = theme.border}
        />
      </div>
    );

    // ---------- Button ----------
    const Button = ({ children, onClick, variant = "primary", size = "md", style = {}, disabled = false }) => {
      const styles = {
        primary: { background: theme.accent, color: "#000", border: "none" },
        secondary: { background: "transparent", color: theme.accent, border: `1px solid ${theme.accent}` },
        ghost: { background: "transparent", color: theme.subtle, border: `1px solid ${theme.border}` },
        danger: { background: "rgba(239,68,68,0.1)", color: theme.red, border: `1px solid rgba(239,68,68,0.3)` },
      };
      const sizes = { sm: "8px 14px", md: "10px 20px", lg: "13px 28px" };
      return (
        <button onClick={onClick} disabled={disabled} style={{ ...styles[variant], padding: sizes[size], borderRadius: 10, fontSize: size === "sm" ? 12 : 14, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.2s", opacity: disabled ? 0.5 : 1, display: "inline-flex", alignItems: "center", gap: 6, ...style }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.opacity = "0.85"; }}
          onMouseLeave={e => { e.currentTarget.style.opacity = "1"; }}
        >{children}</button>
      );
    };

    // ---------- Icon (inline) ----------
    const Icon = ({ name, size = 18, color = "currentColor" }) => {
      const icons = {
        dashboard: <><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>,
        charts: <><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></>,
        projects: <><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>,
        reports: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
        audit: <><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>,
        users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
        logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        filter: <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        bell: <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
        user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
        eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
        medical: <><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></>,
        trending: <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
        activity: <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>,
        clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {icons[name]}
        </svg>
      );
    };

    // ---------- StatCard ----------
    const StatCard = ({ label, value, icon, change, color = theme.accent }) => (
      <Card>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ width: 42, height: 42, borderRadius: 12, background: `${color}18`, border: `1px solid ${color}40`, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name={icon} size={20} color={color} />
          </div>
          {change !== undefined && (
            <span style={{ fontSize: 12, fontWeight: 600, color: change > 0 ? theme.accent : theme.red, background: change > 0 ? "rgba(0,198,167,0.1)" : "rgba(239,68,68,0.1)", padding: "3px 8px", borderRadius: 8 }}>
              {change > 0 ? "+" : ""}{change}%
            </span>
          )}
        </div>
        <div style={{ fontSize: 30, fontWeight: 700, letterSpacing: "-1px", fontFamily: "'JetBrains Mono', monospace", color: theme.text }}>{value}</div>
        <div style={{ fontSize: 13, color: theme.muted, marginTop: 4 }}>{label}</div>
      </Card>
    );

    // ---------- Login ----------
    const LoginPage = ({ onLogin }) => {
      const [email, setEmail] = useState("admin@medtrack.io");
      const [password, setPassword] = useState("password");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const handleSubmit = () => {
        setError("");
        if (!email || !password) { setError("Please fill in all fields."); return; }
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          if (email && password.length >= 6) {
            onLogin({ email, name: "David Lee", role: "Admin" });
          } else {
            setError("Invalid credentials.");
          }
        }, 800);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: theme.bg, position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,198,167,0.08) 0%, transparent 70%)", top: -100, left: -100 }} />
          <div style={{ position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%)", bottom: -80, right: -80 }} />
          <div className="fade-in" style={{ width: "100%", maxWidth: 420, padding: 20 }}>
            <div style={{ textAlign: "center", marginBottom: 40 }}>
              <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 56, height: 56, borderRadius: 16, background: theme.accentDim, border: `1px solid ${theme.accentGlow}`, marginBottom: 16 }}>
                <Icon name="activity" size={28} color={theme.accent} />
              </div>
              <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.5px" }}>Med<span style={{ color: theme.accent }}>Track</span> AI</div>
              <div style={{ color: theme.muted, fontSize: 14, marginTop: 4 }}>Medical Coding Workflow</div>
            </div>
            <Card>
              <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Sign In</div>
              <div style={{ color: theme.muted, fontSize: 13, marginBottom: 28 }}>Enter your credentials</div>
              {error && <div style={{ background: "rgba(239,68,68,0.1)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: theme.red, marginBottom: 20 }}>{error}</div>}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <Input label="Email Address" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@medtrack.io" />
                <Input label="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
                <div style={{ textAlign: "right" }}><span style={{ fontSize: 13, color: theme.accent, cursor: "pointer" }}>Forgot password?</span></div>
                <button onClick={handleSubmit} disabled={loading} style={{ background: loading ? theme.accentDim : theme.accent, color: loading ? theme.accent : "#000", border: `1px solid ${theme.accent}`, borderRadius: 10, padding: "13px", fontSize: 15, fontWeight: 700, cursor: loading ? "not-allowed" : "pointer", transition: "all 0.2s", marginTop: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                  {loading ? <><div style={{ width: 16, height: 16, border: `2px solid ${theme.accent}`, borderTop: "2px solid transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> Signing in...</> : "Sign In →"}
                </button>
              </div>
              <div style={{ textAlign: "center", marginTop: 24, fontSize: 12, color: theme.muted }}>Demo: any email + 6+ char password</div>
            </Card>
            <div style={{ textAlign: "center", marginTop: 24, fontSize: 12, color: theme.muted }}>© 2026 MedTrack AI · HIPAA Compliant</div>
          </div>
        </div>
      );
    };

    // ---------- Nav items ----------
    const navItems = [
      { id: "dashboard", label: "Dashboard", icon: "dashboard" },
      { id: "charts", label: "Charts", icon: "charts" },
      { id: "projects", label: "Projects", icon: "projects" },
      { id: "reports", label: "Reports", icon: "reports" },
      { id: "audit", label: "Audit", icon: "audit" },
      { id: "users", label: "Users", icon: "users" },
      { id: "settings", label: "Settings", icon: "settings" },
    ];

    // ---------- Sidebar ----------
    const Sidebar = ({ active, onNav, user, onLogout, collapsed }) => (
      <div style={{ width: collapsed ? 70 : 240, minHeight: "100vh", background: theme.surface, borderRight: `1px solid ${theme.border}`, display: "flex", flexDirection: "column", transition: "width 0.3s", flexShrink: 0, position: "fixed", top: 0, left: 0, bottom: 0, zIndex: 100 }}>
        <div style={{ padding: collapsed ? "20px 0" : "20px 20px", borderBottom: `1px solid ${theme.border}`, display: "flex", alignItems: "center", gap: 12, justifyContent: collapsed ? "center" : "flex-start" }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: theme.accentDim, border: `1px solid ${theme.accentGlow}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Icon name="activity" size={18} color={theme.accent} />
          </div>
          {!collapsed && <div><div style={{ fontSize: 16, fontWeight: 700 }}>Med<span style={{ color: theme.accent }}>Track</span></div><div style={{ fontSize: 10, color: theme.muted }}>AI PLATFORM</div></div>}
        </div>
        <nav style={{ flex: 1, padding: "16px 12px", display: "flex", flexDirection: "column", gap: 4 }}>
          {navItems.map(item => {
            const isActive = active === item.id;
            return (
              <button key={item.id} onClick={() => onNav(item.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: collapsed ? "11px 0" : "11px 14px", borderRadius: 10, border: "none", cursor: "pointer", justifyContent: collapsed ? "center" : "flex-start", background: isActive ? theme.accentDim : "transparent", color: isActive ? theme.accent : theme.subtle, transition: "all 0.15s", fontSize: 14, fontWeight: isActive ? 600 : 400, position: "relative" }}
                onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = theme.border; e.currentTarget.style.color = theme.text; } }}
                onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = theme.subtle; } }}
              >
                {isActive && <div style={{ position: "absolute", left: 0, top: "20%", bottom: "20%", width: 3, borderRadius: 2, background: theme.accent }} />}
                <Icon name={item.icon} size={18} />
                {!collapsed && item.label}
              </button>
            );
          })}
        </nav>
        <div style={{ padding: "12px", borderTop: `1px solid ${theme.border}` }}>
          {!collapsed && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 10, background: theme.border, marginBottom: 8 }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: theme.accentDim, border: `1px solid ${theme.accent}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="user" size={14} color={theme.accent} /></div>
              <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{user.name}</div><div style={{ fontSize: 11, color: theme.muted }}>{user.role}</div></div>
            </div>
          )}
          <button onClick={onLogout} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: collapsed ? "center" : "flex-start", gap: 8, padding: collapsed ? "10px 0" : "10px 12px", borderRadius: 10, border: "none", background: "transparent", color: theme.muted, cursor: "pointer", fontSize: 13 }}
            onMouseEnter={e => { e.currentTarget.style.color = theme.red; e.currentTarget.style.background = "rgba(239,68,68,0.08)"; }}
            onMouseLeave={e => { e.currentTarget.style.color = theme.muted; e.currentTarget.style.background = "transparent"; }}
          ><Icon name="logout" size={16} />{!collapsed && "Logout"}</button>
        </div>
      </div>
    );

    // ---------- TopBar ----------
    const TopBar = ({ title, subtitle, sidebarWidth, onToggle }) => (
      <div style={{ position: "fixed", top: 0, left: sidebarWidth, right: 0, height: 64, background: `${theme.bg}EE`, backdropFilter: "blur(12px)", borderBottom: `1px solid ${theme.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 24px", zIndex: 90 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <button onClick={onToggle} style={{ background: "none", border: "none", color: theme.muted, cursor: "pointer", padding: 6, borderRadius: 8 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>
          </button>
          <div><div style={{ fontSize: 18, fontWeight: 700 }}>{title}</div>{subtitle && <div style={{ fontSize: 12, color: theme.muted }}>{subtitle}</div>}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 10, padding: "8px 14px" }}>
            <Icon name="search" size={15} color={theme.muted} />
            <input placeholder="Search..." style={{ background: "none", border: "none", color: theme.text, fontSize: 13, width: 160, outline: "none" }} />
          </div>
          <div style={{ position: "relative", cursor: "pointer" }}>
            <div style={{ width: 38, height: 38, borderRadius: 10, background: theme.surface, border: `1px solid ${theme.border}`, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="bell" size={16} color={theme.subtle} /></div>
            <div style={{ position: "absolute", top: 7, right: 7, width: 7, height: 7, borderRadius: "50%", background: theme.accent, border: `2px solid ${theme.bg}` }} />
          </div>
        </div>
      </div>
    );

    // ---------- Dashboard with Chart Components ----------
    const DashboardPage = () => {
      // Check if Recharts is available
      const hasRecharts = LineChart && AreaChart && BarChart;
      
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
            <StatCard label="Total Charts Today" value="348" icon="charts" change={12} color={theme.accent} />
            <StatCard label="Productivity Rate" value="87%" icon="trending" change={3} color={theme.blue} />
            <StatCard label="Active Coders" value="12" icon="users" change={0} color={theme.purple} />
            <StatCard label="Pending Charts" value="64" icon="clock" change={-8} color={theme.amber} />
          </div>
          
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 16 }}>
            <Card>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>Chart Completion Trend</div>
                  <div style={{ fontSize: 12, color: theme.muted }}>Past 7 days</div>
                </div>
                <div style={{ display: "flex", gap: 16, fontSize: 12 }}>
                  {[{ c: theme.accent, l: "Completed" }, { c: theme.amber, l: "Pending" }, { c: theme.border, l: "Target" }].map(i => (
                    <div key={i.l} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <div style={{ width: 10, height: 3, background: i.c }} />
                      <span style={{ color: theme.muted }}>{i.l}</span>
                    </div>
                  ))}
                </div>
              </div>
              
              {hasRecharts ? (
                <ResponsiveContainer width="100%" height={220}>
                  <AreaChart data={chartTrendData}>
                    <defs>
                      <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor={theme.accent} stopOpacity={0.2} />
                        <stop offset="95%" stopColor={theme.accent} stopOpacity={0} />
                      </linearGradient>
                      <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor={theme.amber} stopOpacity={0.15} />
                        <stop offset="95%" stopColor={theme.amber} stopOpacity={0} />
                      </linearGradient>
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke={theme.border} vertical={false} />
                    <XAxis dataKey="day" tick={{ fill: theme.muted, fontSize: 12 }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fill: theme.muted, fontSize: 12 }} axisLine={false} tickLine={false} />
                    <Tooltip contentStyle={{ background: theme.card, border: `1px solid ${theme.border}`, borderRadius: 10 }} />
                    <Area type="monotone" dataKey="completed" stroke={theme.accent} fill="url(#grad1)" strokeWidth={2.5} dot={false} />
                    <Area type="monotone" dataKey="pending" stroke={theme.amber} fill="url(#grad2)" strokeWidth={2} dot={false} />
                    <Line type="monotone" dataKey="target" stroke={theme.border} strokeWidth={1.5} strokeDasharray="5 5" dot={false} />
                  </AreaChart>
                </ResponsiveContainer>
              ) : (
                <div style={{ height: 220, display: "flex", alignItems: "center", justifyContent: "center", color: theme.muted }}>
                  Chart loading...
                </div>
              )}
            </Card>
            
            <Card>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>Productivity Trend</div>
              <div style={{ fontSize: 12, color: theme.muted, marginBottom: 20 }}>Weekly average</div>
              
              {hasRecharts ? (
                <ResponsiveContainer width="100%" height={180}>
                  <BarChart data={productivityData} barSize={28}>
                    <CartesianGrid strokeDasharray="3 3" stroke={theme.border} vertical={false} />
                    <XAxis dataKey="week" tick={{ fill: theme.muted, fontSize: 12 }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fill: theme.muted, fontSize: 12 }} axisLine={false} tickLine={false} domain={[60, 100]} />
                    <Tooltip contentStyle={{ background: theme.card, border: `1px solid ${theme.border}`, borderRadius: 10 }} />
                    <Bar dataKey="rate" fill={theme.blue} radius={[6, 6, 0, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              ) : (
                <div style={{ height: 180, display: "flex", alignItems: "center", justifyContent: "center", color: theme.muted }}>
                  Chart loading...
                </div>
              )}
              
              <div style={{ marginTop: 20, paddingTop: 16, borderTop: `1px solid ${theme.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0" }}>
                  <span style={{ fontSize: 12, color: theme.muted }}>Top Coder</span>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>Ana Torres (98.1%)</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0" }}>
                  <span style={{ fontSize: 12, color: theme.muted }}>Busiest Project</span>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>Medicare Q4 (142 charts)</span>
                </div>
              </div>
            </Card>
          </div>
          
          <Card>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 16 }}>Recent Activity</div>
            {[
              { time: "2m ago", text: "CHT-1042 completed by Sarah M.", type: theme.accent },
              { time: "8m ago", text: "CHT-1041 assigned to James R.", type: theme.blue },
              { time: "23m ago", text: "New chart batch — Medicare Q4", type: theme.amber },
              { time: "1h ago", text: "Audit flag on CHT-1035", type: theme.red },
              { time: "2h ago", text: "Mark Wilson set inactive", type: theme.blue }
            ].map((a, i) => (
              <div key={i} style={{ display: "flex", gap: 14, padding: "12px 0", borderBottom: i < 4 ? `1px solid ${theme.border}` : "none" }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: a.type, marginTop: 5 }} />
                <div style={{ flex: 1, fontSize: 13 }}>{a.text}</div>
                <div style={{ fontSize: 12, color: theme.muted }}>{a.time}</div>
              </div>
            ))}
          </Card>
        </div>
      );
    };

    // ---------- ChartsPage ----------
    const ChartsPage = () => {
      const [charts, setCharts] = useState(initialCharts);
      const [search, setSearch] = useState("");
      const [statusFilter, setStatusFilter] = useState("All");
      const [showModal, setShowModal] = useState(false);
      const [newChart, setNewChart] = useState({ project: "", coder: "", priority: "Medium" });
      
      const filtered = charts.filter(c => 
        (statusFilter === "All" || c.status === statusFilter) && 
        (c.id.toLowerCase().includes(search.toLowerCase()) || 
         c.project.toLowerCase().includes(search.toLowerCase()) || 
         c.coder.toLowerCase().includes(search.toLowerCase()))
      );
      
      const addChart = () => { 
        if (!newChart.project || !newChart.coder) return; 
        const id = `CHT-${1043 + charts.length}`; 
        setCharts([{ 
          id, 
          project: newChart.project, 
          coder: newChart.coder, 
          status: "Pending", 
          date: new Date().toISOString().slice(0,10), 
          priority: newChart.priority 
        }, ...charts]); 
        setNewChart({ project: "", coder: "", priority: "Medium" }); 
        setShowModal(false); 
      };
      
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
          <Card>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
              <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, background:theme.surface, border:`1px solid ${theme.border}`, borderRadius:10, padding:"9px 14px" }}>
                  <Icon name="search" size={14} color={theme.muted} />
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search charts..." style={{ background:"none", border:"none", color:theme.text, fontSize:13, width:180, outline:"none" }} />
                </div>
                {["All","Completed","In Progress","Pending"].map(s => (
                  <button key={s} onClick={()=>setStatusFilter(s)} style={{ 
                    padding:"9px 16px", borderRadius:10, border:"none", cursor:"pointer", fontSize:13, fontWeight:500,
                    background: statusFilter===s ? theme.accentDim : theme.surface, 
                    color: statusFilter===s ? theme.accent : theme.muted, 
                    border:`1px solid ${statusFilter===s ? theme.accent : theme.border}` 
                  }}>{s}</button>
                ))}
              </div>
              <Button onClick={()=>setShowModal(true)}><Icon name="plus" size={15} color="#000" /> Add Chart</Button>
            </div>
          </Card>
          
          <Card animate={false}>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14 }}>
                <thead>
                  <tr>
                    {["Chart ID","Project","Coder","Priority","Status","Date","Actions"].map(h=>(
                      <th key={h} style={{ padding:"10px 16px", textAlign:"left", color:theme.muted, fontSize:12, fontWeight:600, textTransform:"uppercase", borderBottom:`1px solid ${theme.border}` }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((c,i)=>(
                    <tr key={c.id} style={{ borderBottom: i<filtered.length-1 ? `1px solid ${theme.border}` : "none" }} 
                      onMouseEnter={e=>e.currentTarget.style.background=`${theme.border}40`} 
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{ padding:"14px 16px", fontFamily:"'JetBrains Mono', monospace", fontSize:13, color:theme.accent }}>{c.id}</td>
                      <td style={{ padding:"14px 16px", fontWeight:500 }}>{c.project}</td>
                      <td style={{ padding:"14px 16px", color:theme.subtle }}>{c.coder}</td>
                      <td style={{ padding:"14px 16px" }}><Badge status={c.priority} /></td>
                      <td style={{ padding:"14px 16px" }}><Badge status={c.status} /></td>
                      <td style={{ padding:"14px 16px", color:theme.muted }}>{c.date}</td>
                      <td style={{ padding:"14px 16px" }}>
                        <div style={{ display:"flex", gap:6 }}>
                          <button style={{ padding:6, borderRadius:8, background:theme.surface, color:theme.muted, cursor:"pointer" }}><Icon name="eye" size={14} /></button>
                          <button style={{ padding:6, borderRadius:8, background:theme.surface, color:theme.muted, cursor:"pointer" }}><Icon name="edit" size={14} /></button>
                          <button onClick={()=>setCharts(charts.filter(x=>x.id!==c.id))} style={{ padding:6, borderRadius:8, background:"rgba(239,68,68,0.08)", color:theme.red, cursor:"pointer" }}><Icon name="trash" size={14} /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {filtered.length===0 && <div style={{ textAlign:"center", padding:40, color:theme.muted }}>No charts found.</div>}
            </div>
            <div style={{ marginTop:16, display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:13, color:theme.muted }}>
              <span>Showing {filtered.length} of {charts.length} charts</span>
              <div style={{ display:"flex", gap:6 }}>
                {[1,2,3].map(p=>(
                  <button key={p} style={{ width:32, height:32, borderRadius:8, border:`1px solid ${p===1?theme.accent:theme.border}`, background:p===1?theme.accentDim:"transparent", color:p===1?theme.accent:theme.muted, cursor:"pointer", fontSize:13, fontWeight:p===1?600:400 }}>{p}</button>
                ))}
              </div>
            </div>
          </Card>
          
          {showModal && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }} onClick={e=>{ if(e.target===e.currentTarget) setShowModal(false); }}>
              <div className="fade-in" style={{ background:theme.card, border:`1px solid ${theme.border}`, borderRadius:20, padding:32, width:420 }}>
                <div style={{ fontSize:18, fontWeight:700, marginBottom:20 }}>Add New Chart</div>
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                  <Input label="Project Name" value={newChart.project} onChange={e=>setNewChart({...newChart, project:e.target.value})} placeholder="e.g. Medicare Q4" />
                  <Input label="Assigned Coder" value={newChart.coder} onChange={e=>setNewChart({...newChart, coder:e.target.value})} placeholder="e.g. Sarah M." />
                  <div>
                    <label style={{ fontSize:13, color:theme.subtle, fontWeight:500, display:"block", marginBottom:6 }}>Priority</label>
                    <select value={newChart.priority} onChange={e=>setNewChart({...newChart, priority:e.target.value})} style={{ width:"100%", background:theme.surface, border:`1px solid ${theme.border}`, borderRadius:10, padding:"10px 14px", color:theme.text, fontSize:14, outline:"none" }}>
                      {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>
                  <div style={{ display:"flex", gap:10, marginTop:8 }}>
                    <Button onClick={()=>setShowModal(false)} variant="ghost" style={{ flex:1, justifyContent:"center" }}>Cancel</Button>
                    <Button onClick={addChart} style={{ flex:1, justifyContent:"center" }}>Add Chart</Button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ---------- ProjectsPage (simplified) ----------
    const ProjectsPage = () => {
      const projects = [
        { name:"Medicare Q4", charts:142, completed:118, status:"On Track" },
        { name:"Medicaid Review", charts:89, completed:54, status:"At Risk" },
        { name:"Blue Cross Audit", charts:64, completed:40, status:"On Track" },
        { name:"UHC Claims", charts:51, completed:22, status:"Delayed" },
        { name:"Aetna Batch", charts:38, completed:0, status:"On Track" }
      ];
      const statusColor = { "On Track": theme.accent, "At Risk": theme.amber, "Delayed": theme.red };
      
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          {projects.map(p=>{ 
            const pct = Math.round((p.completed/p.charts)*100); 
            return (
              <Card key={p.name}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                  <div>
                    <div style={{ fontSize:16, fontWeight:700 }}>
                      {p.name} <span style={{ fontSize:12, fontWeight:600, color:statusColor[p.status], background:`${statusColor[p.status]}15`, padding:"2px 8px", borderRadius:12 }}>{p.status}</span>
                    </div>
                    <div style={{ fontSize:13, color:theme.muted, marginTop:8 }}>{p.completed}/{p.charts} charts · {pct}%</div>
                    <div style={{ width:200, height:6, background:theme.border, borderRadius:3, marginTop:8 }}>
                      <div style={{ width:`${pct}%`, height:6, background:statusColor[p.status], borderRadius:3 }} />
                    </div>
                  </div>
                  <Button variant="secondary" size="sm">View</Button>
                </div>
              </Card>
            );
          })}
        </div>
      );
    };

    // ---------- ReportsPage (simplified) ----------
    const ReportsPage = () => (
      <div>
        <Card>
          <div style={{ fontSize:16, fontWeight:700 }}>Reports (filter & export mock)</div>
          <div style={{ padding:20, color:theme.muted }}>Report builder preview – full version in final code</div>
        </Card>
      </div>
    );
    
    // ---------- AuditPage (simplified) ----------
    const AuditPage = () => (
      <div>
        <Card>
          <div style={{ fontSize:16, fontWeight:700 }}>Audit log (sample)</div>
          {["CHT-1035 high severity","CHT-1028 medium"].map((t,i)=>(
            <div key={i} style={{ padding:12, borderBottom:`1px solid ${theme.border}` }}>{t}</div>
          ))}
        </Card>
      </div>
    );
    
    // ---------- UsersPage ----------
    const UsersPage = () => {
      const [users, setUsers] = useState(initialUsers);
      const [showModal, setShowModal] = useState(false);
      const [newUser, setNewUser] = useState({ name:"", email:"", role:"Coder" });
      
      const addUser = () => { 
        if(!newUser.name||!newUser.email) return; 
        setUsers([...users, { id:Date.now(), ...newUser, status:"Active", charts:0, accuracy:"—" }]); 
        setNewUser({ name:"", email:"", role:"Coder" }); 
        setShowModal(false); 
      };
      
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
          <div style={{ display:"flex", justifyContent:"flex-end" }}>
            <Button onClick={()=>setShowModal(true)}><Icon name="plus" size={15} color="#000" /> Add User</Button>
          </div>
          
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px,1fr))", gap:16 }}>
            {users.map(u=>(
              <Card key={u.id}>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                  <div style={{ width:44, height:44, borderRadius:14, background:theme.accentDim, border:`1px solid ${theme.accent}`, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, color:theme.accent }}>
                    {u.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                  </div>
                  <div>
                    <div style={{ fontWeight:700 }}>{u.name}</div>
                    <div style={{ fontSize:12, color:theme.muted }}>{u.email}</div>
                  </div>
                  <Badge status={u.status} />
                </div>
                
                <div style={{ display:"flex", justifyContent:"space-between", padding:"12px 0", borderTop:`1px solid ${theme.border}`, borderBottom:`1px solid ${theme.border}` }}>
                  <div>
                    <div style={{ fontSize:18, fontWeight:700 }}>{u.charts}</div>
                    <div style={{ fontSize:11, color:theme.muted }}>Charts</div>
                  </div>
                  <div>
                    <div style={{ fontSize:18, fontWeight:700 }}>{u.accuracy}</div>
                    <div style={{ fontSize:11, color:theme.muted }}>Accuracy</div>
                  </div>
                  <div>
                    <Badge status={u.role} />
                  </div>
                </div>
                
                <div style={{ display:"flex", gap:8, marginTop:12 }}>
                  <Button variant="secondary" size="sm" style={{ flex:1 }}>Edit</Button>
                  <Button variant="danger" size="sm" style={{ flex:1 }} onClick={()=>setUsers(users.filter(x=>x.id!==u.id))}>Remove</Button>
                </div>
              </Card>
            ))}
          </div>
          
          {showModal && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={e=>{ if(e.target===e.currentTarget) setShowModal(false); }}>
              <div style={{ background:theme.card, border:`1px solid ${theme.border}`, borderRadius:20, padding:32, width:400 }}>
                <div style={{ fontSize:18, fontWeight:700, marginBottom:20 }}>Add User</div>
                <Input label="Name" value={newUser.name} onChange={e=>setNewUser({...newUser, name:e.target.value})} />
                <Input label="Email" value={newUser.email} onChange={e=>setNewUser({...newUser, email:e.target.value})} />
                <div style={{ marginTop:12 }}>
                  <label style={{ fontSize:13, color:theme.subtle }}>Role</label>
                  <select value={newUser.role} onChange={e=>setNewUser({...newUser, role:e.target.value})} style={{ width:"100%", background:theme.surface, border:`1px solid ${theme.border}`, borderRadius:10, padding:"10px", marginTop:4, color:theme.text }}>
                    <option>Admin</option>
                    <option>Coder</option>
                  </select>
                </div>
                <div style={{ display:"flex", gap:10, marginTop:20 }}>
                  <Button onClick={()=>setShowModal(false)} variant="ghost" style={{ flex:1 }}>Cancel</Button>
                  <Button onClick={addUser} style={{ flex:1 }}>Add</Button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ---------- SettingsPage (minimal) ----------
    const SettingsPage = () => (
      <Card>
        <div style={{ fontSize:16, fontWeight:700 }}>Settings (company profile, password, toggles)</div>
      </Card>
    );

    // ---------- Main App ----------
    function MedTrackAI() {
      const [user, setUser] = useState(null);
      const [page, setPage] = useState("dashboard");
      const [collapsed, setCollapsed] = useState(false);
      
      const sidebarWidth = collapsed ? 70 : 240;
      
      const pageMeta = { 
        dashboard:{ title:"Dashboard", subtitle:"Welcome back" }, 
        charts:{ title:"Charts", subtitle:"Manage charts" }, 
        projects:{ title:"Projects", subtitle:"Active projects" }, 
        reports:{ title:"Reports", subtitle:"Analytics" }, 
        audit:{ title:"Audit", subtitle:"QA log" }, 
        users:{ title:"Users", subtitle:"Manage coders" }, 
        settings:{ title:"Settings", subtitle:"Preferences" } 
      };
      
      const PageComponent = { 
        dashboard:DashboardPage, 
        charts:ChartsPage, 
        projects:ProjectsPage, 
        reports:ReportsPage, 
        audit:AuditPage, 
        users:UsersPage, 
        settings:SettingsPage 
      }[page];
      
      if (!user) return <LoginPage onLogin={setUser} />;
      
      return (
        <>
          <style>{globalStyles}</style>
          <div style={{ display:"flex", minHeight:"100vh" }}>
            <Sidebar active={page} onNav={setPage} user={user} onLogout={()=>setUser(null)} collapsed={collapsed} />
            <div style={{ flex:1, marginLeft:sidebarWidth, transition:"margin-left 0.3s", minHeight:"100vh", display:"flex", flexDirection:"column" }}>
              <TopBar title={pageMeta[page].title} subtitle={pageMeta[page].subtitle} sidebarWidth={sidebarWidth} onToggle={()=>setCollapsed(!collapsed)} />
              <main style={{ flex:1, padding:"88px 24px 32px", maxWidth:1400, width:"100%" }}>
                <PageComponent />
              </main>
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MedTrackAI));
  </script>
</body>
</html>
