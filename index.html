<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedTrack AI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0B0F1A; color: #F1F5F9; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #1F2A3D; border-radius: 2px; }
    input, select, textarea, button { font-family: 'DM Sans', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .spinner { width: 16px; height: 16px; border: 2px solid #00C6A7; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#00C6A7;font-family:sans-serif;font-size:18px;">Loading MedTrack AI...</div></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
            ResponsiveContainer, AreaChart, Area, BarChart, Bar } = Recharts;

    // THEME
    const T = {
      bg: "#0B0F1A", surface: "#111827", card: "#161D2E", border: "#1F2A3D",
      accent: "#00C6A7", accentDim: "rgba(0,198,167,0.12)", accentGlow: "rgba(0,198,167,0.3)",
      blue: "#3B82F6", purple: "#8B5CF6", amber: "#F59E0B", red: "#EF4444",
      text: "#F1F5F9", muted: "#64748B", subtle: "#94A3B8",
    };

    // DATA
    const trendData = [
      { day:"Mon", completed:42, pending:18, target:50 },
      { day:"Tue", completed:58, pending:12, target:50 },
      { day:"Wed", completed:47, pending:22, target:50 },
      { day:"Thu", completed:63, pending:9,  target:50 },
      { day:"Fri", completed:71, pending:5,  target:50 },
      { day:"Sat", completed:38, pending:14, target:50 },
      { day:"Sun", completed:29, pending:8,  target:50 },
    ];
    const prodData = [
      {week:"W1",rate:72},{week:"W2",rate:78},{week:"W3",rate:81},
      {week:"W4",rate:76},{week:"W5",rate:85},{week:"W6",rate:89},
    ];
    const initCharts = [
      {id:"CHT-1042",project:"Medicare Q4",coder:"Sarah M.",status:"Completed",date:"2026-02-22",priority:"High"},
      {id:"CHT-1041",project:"Medicaid Review",coder:"James R.",status:"In Progress",date:"2026-02-22",priority:"Medium"},
      {id:"CHT-1040",project:"Blue Cross Audit",coder:"Ana T.",status:"Pending",date:"2026-02-21",priority:"High"},
      {id:"CHT-1039",project:"Medicare Q4",coder:"David L.",status:"Completed",date:"2026-02-21",priority:"Low"},
      {id:"CHT-1038",project:"UHC Claims",coder:"Sarah M.",status:"In Progress",date:"2026-02-20",priority:"Medium"},
      {id:"CHT-1037",project:"Aetna Batch",coder:"Mark W.",status:"Pending",date:"2026-02-20",priority:"High"},
      {id:"CHT-1036",project:"Medicaid Review",coder:"James R.",status:"Completed",date:"2026-02-19",priority:"Low"},
      {id:"CHT-1035",project:"Blue Cross Audit",coder:"Ana T.",status:"Completed",date:"2026-02-19",priority:"Medium"},
    ];
    const initUsers = [
      {id:1,name:"Sarah Mitchell",email:"sarah.m@medtrack.io",role:"Coder",status:"Active",charts:142,accuracy:"96.8%"},
      {id:2,name:"James Rivera",email:"james.r@medtrack.io",role:"Coder",status:"Active",charts:118,accuracy:"94.2%"},
      {id:3,name:"Ana Torres",email:"ana.t@medtrack.io",role:"Coder",status:"Active",charts:97,accuracy:"98.1%"},
      {id:4,name:"David Lee",email:"david.l@medtrack.io",role:"Admin",status:"Active",charts:0,accuracy:"—"},
      {id:5,name:"Mark Wilson",email:"mark.w@medtrack.io",role:"Coder",status:"Inactive",charts:63,accuracy:"91.5%"},
    ];

    // BADGE
    const Badge = ({status}) => {
      const map = {
        Completed:{c:T.accent,b:"rgba(0,198,167,0.1)"},
        "In Progress":{c:T.blue,b:"rgba(59,130,246,0.1)"},
        Pending:{c:T.amber,b:"rgba(245,158,11,0.1)"},
        Active:{c:T.accent,b:"rgba(0,198,167,0.1)"},
        Inactive:{c:T.muted,b:"rgba(100,116,139,0.1)"},
        High:{c:T.red,b:"rgba(239,68,68,0.1)"},
        Medium:{c:T.amber,b:"rgba(245,158,11,0.1)"},
        Low:{c:T.accent,b:"rgba(0,198,167,0.1)"},
        Admin:{c:T.purple,b:"rgba(139,92,246,0.1)"},
        Coder:{c:T.blue,b:"rgba(59,130,246,0.1)"},
      };
      const s = map[status] || {c:T.muted,b:"rgba(100,116,139,0.1)"};
      return (
        <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:600,color:s.c,background:s.b}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:s.c,flexShrink:0}} />
          {status}
        </span>
      );
    };

    // CARD
    const Card = ({children, style={}, anim=true}) => (
      <div className={anim?"fade-in":""} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:24,...style}}>
        {children}
      </div>
    );

    // INPUT
    const Input = ({label,type="text",value,onChange,placeholder,style={}}) => (
      <div style={{display:"flex",flexDirection:"column",gap:6,...style}}>
        {label && <label style={{fontSize:13,color:T.subtle,fontWeight:500}}>{label}</label>}
        <input type={type} value={value} onChange={onChange} placeholder={placeholder}
          style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",color:T.text,fontSize:14,outline:"none"}}
          onFocus={e=>e.target.style.borderColor=T.accent}
          onBlur={e=>e.target.style.borderColor=T.border}
        />
      </div>
    );

    // BUTTON
    const Btn = ({children,onClick,variant="primary",size="md",style={},disabled=false}) => {
      const vs = {
        primary:{background:T.accent,color:"#000",border:"none"},
        secondary:{background:"transparent",color:T.accent,border:`1px solid ${T.accent}`},
        ghost:{background:"transparent",color:T.subtle,border:`1px solid ${T.border}`},
        danger:{background:"rgba(239,68,68,0.1)",color:T.red,border:`1px solid rgba(239,68,68,0.3)`},
      };
      const ps = {sm:"7px 13px",md:"10px 20px",lg:"13px 28px"};
      return (
        <button onClick={onClick} disabled={disabled}
          style={{...vs[variant],padding:ps[size],borderRadius:10,fontSize:size==="sm"?12:14,fontWeight:600,
            cursor:disabled?"not-allowed":"pointer",transition:"all 0.2s",opacity:disabled?0.5:1,
            display:"inline-flex",alignItems:"center",gap:6,...style}}
          onMouseEnter={e=>{if(!disabled)e.currentTarget.style.opacity="0.8";}}
          onMouseLeave={e=>{e.currentTarget.style.opacity="1";}}
        >{children}</button>
      );
    };

    // ICON
    const Ico = ({n,size=18,color="currentColor"}) => {
      const d = {
        dashboard:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>,
        charts:<><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></>,
        projects:<><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></>,
        reports:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
        audit:<><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>,
        users:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        settings:<><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></>,
        logout:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
        plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        download:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        bell:<><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
        user:<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
        eye:<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
        trending:<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>,
        activity:<><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>,
        clock:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        menu:<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {d[n]}
        </svg>
      );
    };

    // ── LOGIN ──────────────────────────────────────────────────────────────────
    const LoginPage = ({onLogin}) => {
      const [email, setEmail] = useState("admin@medtrack.io");
      const [pass, setPass] = useState("password");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");

      const submit = () => {
        setErr("");
        if (!email || !pass) { setErr("Please fill all fields."); return; }
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          if (pass.length >= 6) onLogin({email, name:"David Lee", role:"Admin"});
          else setErr("Password must be 6+ characters.");
        }, 1000);
      };

      return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,198,167,0.07) 0%,transparent 70%)",top:-100,left:-100}} />
          <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(59,130,246,0.05) 0%,transparent 70%)",bottom:-80,right:-80}} />
          <div className="fade-in" style={{width:"100%",maxWidth:420,padding:20}}>
            <div style={{textAlign:"center",marginBottom:36}}>
              <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:56,height:56,borderRadius:16,background:T.accentDim,border:`1px solid ${T.accentGlow}`,marginBottom:14}}>
                <Ico n="activity" size={28} color={T.accent} />
              </div>
              <div style={{fontSize:28,fontWeight:700,letterSpacing:"-0.5px"}}>Med<span style={{color:T.accent}}>Track</span> AI</div>
              <div style={{color:T.muted,fontSize:13,marginTop:4}}>Medical Coding Workflow Platform</div>
            </div>
            <Card>
              <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Sign In</div>
              <div style={{color:T.muted,fontSize:13,marginBottom:24}}>Welcome back. Enter your credentials.</div>
              {err && <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"10px 14px",fontSize:13,color:T.red,marginBottom:16}}>{err}</div>}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <Input label="Email Address" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@medtrack.io" />
                <Input label="Password" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" />
                <div style={{textAlign:"right"}}><span style={{fontSize:13,color:T.accent,cursor:"pointer"}}>Forgot password?</span></div>
                <button onClick={submit} disabled={loading}
                  style={{background:loading?T.accentDim:T.accent,color:loading?T.accent:"#000",border:`1px solid ${T.accent}`,borderRadius:10,padding:"13px",fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer",transition:"all 0.2s",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  {loading ? <><div className="spinner" />Signing in...</> : "Sign In →"}
                </button>
              </div>
              <div style={{textAlign:"center",marginTop:20,fontSize:12,color:T.muted}}>Demo: any email + 6+ char password</div>
            </Card>
            <div style={{textAlign:"center",marginTop:20,fontSize:12,color:T.muted}}>© 2026 MedTrack AI · HIPAA Compliant</div>
          </div>
        </div>
      );
    };

    // ── SIDEBAR ────────────────────────────────────────────────────────────────
    const navItems = [
      {id:"dashboard",label:"Dashboard",icon:"dashboard"},
      {id:"charts",label:"Charts",icon:"charts"},
      {id:"projects",label:"Projects",icon:"projects"},
      {id:"reports",label:"Reports",icon:"reports"},
      {id:"audit",label:"Audit",icon:"audit"},
      {id:"users",label:"Users",icon:"users"},
      {id:"settings",label:"Settings",icon:"settings"},
    ];

    const Sidebar = ({active,onNav,user,onLogout,collapsed}) => (
      <div style={{width:collapsed?70:240,minHeight:"100vh",background:T.surface,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",transition:"width 0.3s",flexShrink:0,position:"fixed",top:0,left:0,bottom:0,zIndex:100,overflow:"hidden"}}>
        <div style={{padding:collapsed?"18px 0":"18px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10,justifyContent:collapsed?"center":"flex-start"}}>
          <div style={{width:36,height:36,borderRadius:10,background:T.accentDim,border:`1px solid ${T.accentGlow}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ico n="activity" size={18} color={T.accent} />
          </div>
          {!collapsed && (
            <div>
              <div style={{fontSize:16,fontWeight:700}}>Med<span style={{color:T.accent}}>Track</span></div>
              <div style={{fontSize:10,color:T.muted,letterSpacing:"0.05em",textTransform:"uppercase"}}>AI Platform</div>
            </div>
          )}
        </div>
        <nav style={{flex:1,padding:"14px 10px",display:"flex",flexDirection:"column",gap:3}}>
          {navItems.map(item => {
            const active2 = active === item.id;
            return (
              <button key={item.id} onClick={()=>onNav(item.id)}
                style={{display:"flex",alignItems:"center",gap:12,padding:collapsed?"10px 0":"10px 12px",borderRadius:10,border:"none",cursor:"pointer",justifyContent:collapsed?"center":"flex-start",background:active2?T.accentDim:"transparent",color:active2?T.accent:T.subtle,transition:"all 0.15s",fontSize:14,fontWeight:active2?600:400,position:"relative",width:"100%"}}
                onMouseEnter={e=>{if(!active2){e.currentTarget.style.background=T.border;e.currentTarget.style.color=T.text;}}}
                onMouseLeave={e=>{if(!active2){e.currentTarget.style.background="transparent";e.currentTarget.style.color=T.subtle;}}}
              >
                {active2 && <div style={{position:"absolute",left:0,top:"20%",bottom:"20%",width:3,borderRadius:2,background:T.accent}} />}
                <Ico n={item.icon} size={17} />
                {!collapsed && item.label}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"10px",borderTop:`1px solid ${T.border}`}}>
          {!collapsed && (
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 10px",borderRadius:10,background:T.border,marginBottom:8}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:T.accentDim,border:`1px solid ${T.accent}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Ico n="user" size={13} color={T.accent} />
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
                <div style={{fontSize:11,color:T.muted}}>{user.role}</div>
              </div>
            </div>
          )}
          <button onClick={onLogout}
            style={{width:"100%",display:"flex",alignItems:"center",justifyContent:collapsed?"center":"flex-start",gap:8,padding:collapsed?"10px 0":"10px 10px",borderRadius:10,border:"none",background:"transparent",color:T.muted,cursor:"pointer",fontSize:13,transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.color=T.red;e.currentTarget.style.background="rgba(239,68,68,0.08)";}}
            onMouseLeave={e=>{e.currentTarget.style.color=T.muted;e.currentTarget.style.background="transparent";}}
          >
            <Ico n="logout" size={16} />
            {!collapsed && "Logout"}
          </button>
        </div>
      </div>
    );

    // ── TOPBAR ─────────────────────────────────────────────────────────────────
    const TopBar = ({title,subtitle,sw,onToggle}) => (
      <div style={{position:"fixed",top:0,left:sw,right:0,height:64,background:T.bg+"EE",backdropFilter:"blur(12px)",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",zIndex:90,transition:"left 0.3s"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <button onClick={onToggle} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",padding:6,borderRadius:8}}>
            <Ico n="menu" size={18} />
          </button>
          <div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:"-0.3px"}}>{title}</div>
            {subtitle && <div style={{fontSize:12,color:T.muted}}>{subtitle}</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"8px 12px"}}>
            <Ico n="search" size={14} color={T.muted} />
            <input placeholder="Search..." style={{background:"none",border:"none",color:T.text,fontSize:13,width:140,outline:"none"}} />
          </div>
          <div style={{position:"relative",cursor:"pointer"}}>
            <div style={{width:38,height:38,borderRadius:10,background:T.surface,border:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ico n="bell" size={16} color={T.subtle} />
            </div>
            <div style={{position:"absolute",top:8,right:8,width:6,height:6,borderRadius:"50%",background:T.accent,border:`2px solid ${T.bg}`}} />
          </div>
        </div>
      </div>
    );

    // ── STAT CARD ──────────────────────────────────────────────────────────────
    const StatCard = ({label,value,icon,change,color=T.accent}) => (
      <Card>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
          <div style={{width:42,height:42,borderRadius:12,background:color+"20",border:`1px solid ${color}40`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico n={icon} size={20} color={color} />
          </div>
          {change !== undefined && (
            <span style={{fontSize:12,fontWeight:600,color:change>0?T.accent:change<0?T.red:T.muted,background:change>0?"rgba(0,198,167,0.1)":change<0?"rgba(239,68,68,0.1)":"rgba(100,116,139,0.1)",padding:"3px 8px",borderRadius:8}}>
              {change>0?"+":""}{change}%
            </span>
          )}
        </div>
        <div style={{fontSize:30,fontWeight:700,letterSpacing:"-1px",fontFamily:"'JetBrains Mono',monospace"}}>{value}</div>
        <div style={{fontSize:13,color:T.muted,marginTop:4}}>{label}</div>
      </Card>
    );

    // ── DASHBOARD ──────────────────────────────────────────────────────────────
    const Dashboard = () => (
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
          <StatCard label="Total Charts Today" value="348" icon="charts" change={12} color={T.accent} />
          <StatCard label="Productivity Rate" value="87%" icon="trending" change={3} color={T.blue} />

                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:42,height:42,borderRadius:13,background:T.accentDim,border:`1px solid ${T.accentGlow}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:T.accent}}>
                      {u.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
                      <div style={{fontSize:12,color:T.muted}}>{u.email}</div>
                    </div>
                  </div>
                  <Badge status={u.status} />
                </div>
                <div style={{display:"flex",justifyContent:"space-around",padding:"11px 0",borderTop:`1px solid ${T.border}`,borderBottom:`1px solid ${T.border}`,marginBottom:12}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:17,fontWeight:700}}>{u.charts}</div>
                    <div style={{fontSize:11,color:T.muted}}>Charts</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:17,fontWeight:700}}>{u.accuracy}</div>
                    <div style={{fontSize:11,color:T.muted}}>Accuracy</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <Badge status={u.role} />
                    <div style={{fontSize:11,color:T.muted,marginTop:3}}>Role</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:7}}>
                  <Btn variant="secondary" size="sm" style={{flex:1,justifyContent:"center"}}>Edit</Btn>
                  <Btn variant="danger" size="sm" style={{flex:1,justifyContent:"center"}} onClick={()=>setUsers(users.filter(x=>x.id!==u.id))}>Remove</Btn>
                </div>
              </Card>
            ))}
          </div>
          {modal && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)setModal(false);}}>
              <div className="fade-in" style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:20,padding:28,width:390}}>
                <div style={{fontSize:18,fontWeight:700,marginBottom:18}}>Add New User</div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <Input label="Full Name" value={nu.name} onChange={e=>setNu({...nu,name:e.target.value})} placeholder="Jane Doe" />
                  <Input label="Email" type="email" value={nu.email} onChange={e=>setNu({...nu,email:e.target.value})} placeholder="jane@medtrack.io" />
                  <div>
                    <label style={{fontSize:13,color:T.subtle,fontWeight:500,display:"block",marginBottom:6}}>Role</label>
                    <select value={nu.role} onChange={e=>setNu({...nu,role:e.target.value})} style={{width:"100%",background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 14px",color:T.text,fontSize:14,outline:"none"}}>
                      <option>Admin</option><option>Coder</option>
                    </select>
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:6}}>
                    <Btn onClick={()=>setModal(false)} variant="ghost" style={{flex:1,justifyContent:"center"}}>Cancel</Btn>
                    <Btn onClick={addUser} style={{flex:1,justifyContent:"center"}}>Add User</Btn>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ── SETTINGS ───────────────────────────────────────────────────────────────
    const SettingsPage = () => {
      const [co, setCo] = useState({name:"MedTrack Health Systems",email:"admin@medtrack.io",phone:"+1 (555) 012-3456",address:"123 Healthcare Blvd, Boston, MA 02101",npi:"1234567890"});
      const [pw, setPw] = useState({cur:"",nw:"",cf:""});
      const [saved, setSaved] = useState(false);
      const [notif, setNotif] = useState([true,true,false]);
      const save = () => { setSaved(true); setTimeout(()=>setSaved(false),2500); };
      return (
        <div style={{display:"flex",flexDirection:"column",gap:18,maxWidth:680}}>
          <Card>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Company Information</div>
            <div style={{fontSize:13,color:T.muted,marginBottom:20}}>Update your organization details.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Input label="Company Name" value={co.name} onChange={e=>setCo({...co,name:e.target.value})} style={{gridColumn:"1 / -1"}} />
              <Input label="Admin Email" value={co.email} onChange={e=>setCo({...co,email:e.target.value})} />
              <Input label="Phone Number" value={co.phone} onChange={e=>setCo({...co,phone:e.target.value})} />
              <Input label="NPI Number" value={co.npi} onChange={e=>setCo({...co,npi:e.target.value})} />
              <Input label="Address" value={co.address} onChange={e=>setCo({...co,address:e.target.value})} />
            </div>
            <div style={{marginTop:16,display:"flex",gap:10,alignItems:"center"}}>
              <Btn onClick={save}>Save Changes</Btn>
              {saved && <span style={{fontSize:13,color:T.accent}}>✓ Saved successfully</span>}
            </div>
          </Card>
          <Card>
            <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Change Password</div>
            <div style={{fontSize:13,color:T.muted,marginBottom:20}}>Secure your account with a strong password.</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <Input label="Current Password" type="password" value={pw.cur} onChange={e=>setPw({...pw,cur:e.target.value})} placeholder="••••••••" />
              <Input label="New Password" type="password" value={pw.nw} onChange={e=>setPw({...pw,nw:e.target.value})} placeholder="••••••••" />
              <Input label="Confirm New Password" type="password" value={pw.cf} onChange={e=>setPw({...pw,cf:e.target.value})} placeholder="••••••••" />
              {pw.nw && pw.cf && pw.nw!==pw.cf && <div style={{fontSize:12,color:T.red}}>Passwords do not match.</div>}
              <div><Btn onClick={save}>Update Password</Btn></div>
            </div>
          </Card>
          <Card>
            <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>Notifications</div>
            {[
              {l:"Email alerts for flagged charts",s:"Get notified when a chart is flagged"},
              {l:"Daily summary report",s:"Daily digest of coding activity"},
              {l:"Productivity alerts",s:"Alert when productivity drops below threshold"},
            ].map((n,i)=>(
              <div key={n.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 0",borderBottom:i<2?`1px solid ${T.border}`:"none"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:500}}>{n.l}</div>
                  <div style={{fontSize:12,color:T.muted,marginTop:2}}>{n.s}</div>
                </div>
                <div onClick={()=>{const a=[...notif];a[i]=!a[i];setNotif(a);}}
                  style={{width:44,height:24,borderRadius:12,background:notif[i]?T.accent:T.border,cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:3,left:notif[i]?"calc(100% - 21px)":3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                </div>
              </div>
            ))}
          </Card>
        </div>
      );
    };

    // ── MAIN APP ───────────────────────────────────────────────────────────────
    const pageMeta = {
      dashboard:{title:"Dashboard",sub:"Welcome back, David"},
      charts:{title:"Charts",sub:"Manage and track coding charts"},
      projects:{title:"Projects",sub:"All active coding projects"},
      reports:{title:"Reports",sub:"Analytics and performance"},
      audit:{title:"Audit",sub:"Quality assurance & compliance"},
      users:{title:"Users",sub:"Manage coders and admins"},
      settings:{title:"Settings",sub:"Company & account configuration"},
    };
    const pages = {dashboard:Dashboard,charts:ChartsPage,projects:ProjectsPage,reports:ReportsPage,audit:AuditPage,users:UsersPage,settings:SettingsPage};

    function App() {
      const [user, setUser] = useState(null);
      const [page, setPage] = useState("dashboard");
      const [collapsed, setCollapsed] = useState(false);
      const sw = collapsed ? 70 : 240;
      const Page = pages[page];

      if (!user) return <LoginPage onLogin={setUser} />;

      return (
        <div style={{display:"flex",minHeight:"100vh"}}>
          <Sidebar active={page} onNav={setPage} user={user} onLogout={()=>setUser(null)} collapsed={collapsed} />
          <div style={{flex:1,marginLeft:sw,transition:"margin-left 0.3s",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
            <TopBar title={pageMeta[page].title} subtitle={pageMeta[page].sub} sw={sw} onToggle={()=>setCollapsed(!collapsed)} />
            <main style={{flex:1,padding:"80px 22px 30px"}}>
              <Page />
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
